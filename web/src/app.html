<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="viewport-fit=cover, width=device-width, height=device-height, initial-scale=1, maximum-scale=1">
        <meta name="application-name" content="SnapSave">
        <meta name="og:type" content="website">
        <meta property="og:site_name" content="SnapSave">
        <meta name="description" content="Free social media video downloader. Save videos from Instagram, TikTok, Facebook, Twitter, Pinterest and more — no sign-up, no watermarks, no tracking.">
        <meta property="og:description" content="Free social media video downloader. Save videos from Instagram, TikTok, Facebook, Twitter, Pinterest and more — no sign-up, no watermarks, no tracking.">
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:description" content="Free social media video downloader. No sign-up, no watermarks, no tracking.">
        <meta property="og:image" content="https://snapssave.com/og-image.png">
        <meta property="og:image:width" content="1200">
        <meta property="og:image:height" content="630">
        <meta name="twitter:image" content="https://snapssave.com/og-image.png">
        <meta name="keywords" content="video downloader, instagram downloader, tiktok downloader, facebook video downloader, twitter video downloader, pinterest downloader, reddit video downloader, snapchat downloader, save videos online, snapsave">

        <script type="application/ld+json">{"@context":"https://schema.org","@type":"WebSite","name":"SnapSave","url":"https://snapssave.com","description":"Free social media video downloader. Save videos from Instagram, TikTok, Facebook, Twitter, Pinterest and more.","potentialAction":{"@type":"SearchAction","target":"https://snapssave.com/?u={search_term_string}","query-input":"required name=search_term_string"}}</script>
        <script type="application/ld+json">{"@context":"https://schema.org","@type":"Organization","name":"SnapSave","url":"https://snapssave.com","logo":"https://snapssave.com/favicon.png","contactPoint":{"@type":"ContactPoint","contactType":"customer support","url":"https://snapssave.com/about/contact"}}</script>
        <meta name="robots" content="index, follow">

        %sveltekit.head%

        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="apple-mobile-web-app-title" content="SnapSave">

        <link rel="preconnect" href="https://api.snapssave.com">
        <link rel="preconnect" href="https://cloud.umami.is" crossorigin>
        <link rel="alternate" type="application/rss+xml" title="SnapSave Blog RSS" href="https://snapssave.com/rss.xml">

        <!-- Umami analytics -->
        <script defer src="https://cloud.umami.is/script.js" data-website-id="6db6edce-6245-4265-b2b5-c819ab43f0a1"></script>

        <meta name="darkreader-lock">
        <meta name="color-scheme" content="dark light">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

        <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg">
        <link rel="icon" type="image/png" href="%sveltekit.assets%/favicon.png">
        <link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png">
        <link type="application/activity+json" href="">

        <link crossorigin="use-credentials" rel="manifest" href="%sveltekit.assets%/manifest.json">

        <noscript>
            <style>
                #cobalt { opacity: 1 !important }
            </style>
        </noscript>

        <style>
            body, #body-dark {
                background-color: #0B0F19;
            }

            #body-light {
                background-color: #F0F4FF;
            }

            @media (prefers-color-scheme: light) {
                body {
                    background-color: #F0F4FF;
                }
            }

            #cobalt {
                opacity: 0;
            }

            #cobalt.loaded {
                opacity: 1;
                transition: opacity .2s ease-out;
            }
        </style>
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                let settings = localStorage.getItem('settings'), appearance;
                if (settings && ({ appearance } = JSON.parse(settings)) && appearance?.theme) {
                    document.body.id = `body-${appearance.theme}`;
                }
            });
        </script>
    </head>
    <body data-sveltekit-preload-data="hover" data-sveltekit-preload-code="eager">
        <div style="display: contents">
            %sveltekit.body%
        </div>
    </body>
</html>
