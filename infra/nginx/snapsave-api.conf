# SnapSave API — nginx reverse proxy config
# Domain: api.snapssave.com → localhost:9000
#
# SETUP INSTRUCTIONS (after DNS is pointed at this server):
#
#   1. Copy this file:
#      sudo cp snapsave-api.conf /etc/nginx/sites-available/snapsave-api
#      sudo ln -s /etc/nginx/sites-available/snapsave-api /etc/nginx/sites-enabled/
#
#   2. Test config:
#      sudo nginx -t
#
#   3. Install certbot and get SSL cert:
#      sudo apt install certbot python3-certbot-nginx -y
#      sudo certbot --nginx -d api.snapssave.com
#
#   4. Reload nginx:
#      sudo systemctl reload nginx
#
#   5. Update vercel.json WEB_DEFAULT_API to https://api.snapssave.com
#      and redeploy.
#
# ─────────────────────────────────────────────

# HTTP → redirect to HTTPS (certbot fills this in automatically)
server {
    listen 80;
    server_name api.snapssave.com;

    # certbot will add a redirect here automatically
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS → proxy to cobalt API
server {
    listen 443 ssl;
    server_name api.snapssave.com;

    # certbot manages these certificate paths
    # ssl_certificate     /etc/letsencrypt/live/api.snapssave.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.snapssave.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy no-referrer;

    # Proxy to cobalt API on localhost:9000
    location / {
        proxy_pass         http://127.0.0.1:9000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for streaming downloads (cobalt tunnels)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_cache_bypass $http_upgrade;

        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 75s;

        proxy_buffering off;
        proxy_request_buffering off;

        # Allow large media responses
        client_max_body_size 0;
    }
}
